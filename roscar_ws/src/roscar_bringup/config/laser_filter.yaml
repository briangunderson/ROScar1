laser_filter:
  ros__parameters:
    filter1:
      name: range_filter
      type: laser_filters/LaserScanRangeFilter
      params:
        lower_threshold: 0.15    # Drop returns < 15cm (chassis self-reflections)
        upper_threshold: 12.0    # RPLIDAR C1 max range
        use_message_range_limits: false
