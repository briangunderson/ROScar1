# Nav2 configuration for ROScar1 (4WD Mecanum holonomic robot)
#
# Key design choices:
#   - DWB controller with holonomic support (min_vel_y for strafing)
#   - SmacPlanner2D (no min turning radius — suits holonomic)
#   - AMCL with omnidirectional motion model
#   - RPi5-tuned frequencies (controller 10Hz, costmaps 5Hz/1Hz)
#   - Robot footprint from URDF (PLACEHOLDER — update after measuring)

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2      # rotation noise from rotation
    alpha2: 0.2      # rotation noise from translation
    alpha3: 0.2      # translation noise from translation
    alpha4: 0.2      # translation noise from rotation
    alpha5: 0.2      # translation noise (omnidirectional)
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beams_skip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.1
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000           # Reduced from 5000 for RPi5
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::OmniMotionModel  # Critical for mecanum
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.15
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    set_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered    # EKF output, not raw odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: nav2_bt_navigator::NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator::NavigateThroughPosesNavigator
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0       # RPi5-appropriate
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.15
      movement_time_allowance: 20.0

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: true
      # -- Velocity limits (mecanum holonomic) --
      min_vel_x: -0.2
      max_vel_x: 0.5
      min_vel_y: -0.3               # Mecanum strafing!
      max_vel_y: 0.3                # Mecanum strafing!
      max_vel_theta: 2.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_y: 1.0
      acc_lim_theta: 2.5
      decel_lim_x: -1.0
      decel_lim_y: -1.0
      decel_lim_theta: -2.5
      # -- Sampling --
      vx_samples: 10
      vy_samples: 5                 # Must be > 1 for holonomic
      vtheta_samples: 10
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      # -- Critics --
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      ObstacleFootprint.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0   # RPi5 — don't overload CPU
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: nav2_smac_planner::SmacPlanner2D
      tolerance: 0.25               # Goal tolerance (meters)
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true            # Navigate through unmapped areas
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5         # Generous for RPi5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.5

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.5, 0.3, 2.0]     # vx, vy, wz
    min_velocity: [-0.2, -0.3, -2.0]
    max_accel: [1.0, 1.0, 2.5]
    max_decel: [-1.0, -1.0, -2.5]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200  # ms

# ========================
# COSTMAP CONFIGURATION
# ========================

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0          # RPi5-tuned
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Robot footprint (PLACEHOLDER — update after measuring)
      footprint: "[[0.125, 0.14], [0.125, -0.14], [-0.125, -0.14], [-0.125, 0.14]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.20    # Filter out lidar self-reflections from chassis
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 10.0
        inflation_radius: 0.15
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0          # RPi5-tuned — global doesn't need fast updates
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # Robot footprint (PLACEHOLDER — update after measuring)
      footprint: "[[0.125, 0.14], [0.125, -0.14], [-0.125, -0.14], [-0.125, 0.14]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.20    # Filter out lidar self-reflections from chassis
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 10.0
        inflation_radius: 0.15
      always_send_full_costmap: true

# ========================
# COLLISION MONITOR (Jazzy's nav2_bringup includes this by default)
# ========================
# Watches lidar for imminent collisions and can override cmd_vel.
# Without this config, lifecycle_manager_navigation aborts on startup.

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    # Polygons define collision zones around the robot
    # DISABLED: This small robot operates in tight spaces (walls within 15-20cm).
    # The costmap inflation layer handles obstacle avoidance via the planner.
    # Collision monitor polygons are kept but disabled so the node still passes
    # lifecycle activation (Jazzy nav2_bringup requires it).
    polygons: ["PolygonStop"]
    PolygonStop:
      type: polygon
      action_type: stop
      points: "[[0.20, 0.20], [0.20, -0.20], [-0.20, -0.20], [-0.20, 0.20]]"
      min_points: 8
      visualize: false
      polygon_pub_topic: polygon_stop
      enabled: false
    # Observation sources
    observation_sources: ["scan"]
    scan:
      type: scan
      topic: /scan
      enabled: true

# Docking server (included by nav2_bringup in Jazzy — not used but must
# configure to pass lifecycle activation, otherwise the lifecycle manager aborts)
docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: base_link
    fixed_frame: odom
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true

# Route server (included by nav2_bringup in Jazzy — not used but must
# configure to pass lifecycle activation)
route_server:
  ros__parameters:
    use_sim_time: false
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"

# ========================
# SLAM TOOLBOX (used when slam:=True in slam_nav.launch.py)
# ========================
# These params are read by nav2_bringup's slam_launch.py from this file.
# The standalone slam.launch.py uses config/slam_toolbox.yaml instead.

slam_toolbox:
  ros__parameters:
    # -- Solver --
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # -- Frame IDs --
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_scan_matching: true
    use_scan_barycenter: true
    mode: mapping

    # -- Map resolution --
    resolution: 0.05              # 5cm grid — good indoor balance
    max_laser_range: 12.0         # RPLIDAR C1 rated ~12m
    minimum_time_interval: 0.5    # Don't process scans faster than 2Hz
    transform_timeout: 0.5        # Tolerant for RPi5 timing jitter
    tf_buffer_duration: 30.0

    # -- Scan matching thresholds --
    minimum_travel_distance: 0.3  # meters
    minimum_travel_heading: 0.3   # radians (~17 deg)

    # -- Loop closure --
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # -- Correlation search (scan matching) --
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # -- Loop closure search --
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # -- Scan matcher --
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # -- General --
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 5.0
    enable_interactive_mode: true
    use_lifecycle_manager: false
    use_sim_time: false

    # -- Serialization --
    map_file_name: ""
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: true
    stack_size_to_use: 40000000

# Lifecycle manager for map_server + amcl (used in navigation.launch.py)
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""               # Set by launch file
