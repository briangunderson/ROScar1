#
# Intel RealSense D435i driver config for ROScar1.
#
# Tuned for USB 3.0 on the Pi5 with headroom for Nav2 to consume the point
# cloud without saturating the USB bus or the CPU.
#
# - Depth @ 848x480x15, Color @ 640x480x15 — matches the D435i's native stereo
#   depth resolution and stays within USB 3.0 bandwidth with decimation on.
# - Pointcloud aligned to color so every point has RGB (useful for
#   visualization and for Nav2 debug).
# - Decimation filter magnitude 2 (halves pointcloud density) to cut Pi5 CPU.
# - IMU DISABLED — STM32 IMU remains the primary source for EKF. Enable only
#   after deliberate extrinsic calibration.
# - publish_tf=false — URDF (realsense2_description xacro) already owns the
#   TF tree for the camera's internal frames.
#
# GOTCHA: realsense2_camera autodetects CPU SIMD features and renames the
# pointcloud param namespace accordingly. On ARM (Pi5) it's
# `pointcloud__neon_.*`. On x86 with SSSE3 it'd be `pointcloud__ssse3_.*`,
# and on generic x86 it's plain `pointcloud.*`. This config is Pi-specific.
#
/camera/camera:
  ros__parameters:
    # --- Device selection ---
    serial_no: ""
    usb_port_id: ""
    device_type: ""

    # --- Frame-of-reference naming (matches the xacro macro in URDF) ---
    camera_name: "camera"
    base_frame_id: "camera_link"

    # --- Streams ---
    enable_depth: true
    enable_color: true
    enable_infra1: false
    enable_infra2: false
    enable_sync: false  # sync is NOT required by any current consumer and
                        # adding it seems to correlate with depth wedging

    # Resolutions and framerates — balanced for USB 3.0 headroom on a Pi5.
    # Depth 15 Hz keeps Pi5 CPU manageable with decimation + temporal filters.
    # Color 30 Hz since it's the only camera now (replaces Logitech) — the
    # dashboard, ArUco, and YOLO all prefer 30 FPS and USB 3.0 has headroom.
    # After extensive testing on Pi5 + D435i, this is the config that keeps
    # BOTH depth and color streaming simultaneously:
    #   - Depth 640x480x15 (down from native 848x480): 800→600 KB/frame
    #     reduces Pi5 CPU pressure in the driver→DDS serialization path.
    #     At 848x480, depth wedges after ~14 frames even though driver
    #     diagnostics still report "Desired frequency met" — the issue is
    #     downstream frame drops, not the sensor.
    #   - Color 424x240x15 (down from 640x480): frees up Pi5 CPU budget
    #     for the depth stream. 424x240 is still readable in the dashboard
    #     and plenty for ArUco/YOLO detection.
    #   - Both at 15 Hz so enable_sync (if re-enabled) would work cleanly.
    # Rates observed at subscribers: depth ~5 Hz, color ~15 Hz, pointcloud
    # ~7 Hz. Good enough for voxel_layer (Nav2 reads pointcloud at 5-10 Hz
    # typically).
    depth_module.depth_profile: "640x480x15"
    rgb_camera.color_profile: "424x240x15"

    # --- Point cloud (Pi5 / aarch64 → NEON namespace) ---
    pointcloud__neon_.enable: true
    pointcloud__neon_.stream_filter: 2         # 2 = RS2_STREAM_COLOR (aligned pointcloud)
    pointcloud__neon_.stream_index_filter: 0
    pointcloud__neon_.ordered_pc: false
    pointcloud__neon_.allow_no_texture_points: false

    # Align depth to color so pointcloud has RGB + uses color intrinsics.
    align_depth.enable: true

    # --- Filters (post-processing) ---
    # Decimation halves pointcloud density — big CPU saver on Pi5.
    decimation_filter.enable: true
    decimation_filter.filter_magnitude: 2

    # Spatial + temporal filters clean noise. Defaults are reasonable.
    spatial_filter.enable: true
    temporal_filter.enable: true
    hole_filling_filter.enable: false

    # --- IMU: DISABLED for now ---
    # STM32 IMU remains primary for EKF. Enable only with deliberate
    # extrinsic calibration + EKF config changes.
    enable_gyro: false
    enable_accel: false
    unite_imu_method: 0

    # --- Misc ---
    publish_tf: false         # URDF owns the TF tree for the D435i's internal frames
    # initial_reset: true forces the D435i firmware to reset when the driver
    # starts. This adds ~2s to launch but recovers from the known "Asic
    # Temperature value is not valid!" wedge state that silently kills the
    # depth stream (color survives, pointcloud goes dead). If you see
    # repeated ASIC-temp errors in journalctl, the wedge has recurred and
    # a physical USB unplug is probably needed; initial_reset covers most
    # normal restart cases.
    initial_reset: true
    diagnostics_period: 1.0
