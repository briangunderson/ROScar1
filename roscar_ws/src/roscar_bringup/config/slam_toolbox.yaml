# slam_toolbox configuration for ROScar1
# Mode: online_async (RPi5-friendly — processes scans asynchronously)
#
# Usage:
#   ros2 launch roscar_bringup slam.launch.py
#   (drive around with teleop to build map)
#   ros2 run nav2_map_server map_saver_cli -f ~/maps/my_map

slam_toolbox:
  ros__parameters:
    # -- Solver --
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # -- Frame IDs --
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_scan_matching: true
    use_scan_barycenter: true
    mode: mapping

    # -- Map resolution --
    resolution: 0.05              # 5cm grid — good indoor balance
    max_laser_range: 8.0          # Trim noisy long-range returns that confuse matching
    minimum_time_interval: 0.3    # Process scans at ~3Hz (balanced: faster than 2Hz but won't flood queue)
    transform_timeout: 0.5        # Tolerant for RPi5 timing jitter
    tf_buffer_duration: 30.0

    # -- Scan matching thresholds --
    # Moderately tighter thresholds to reduce drift without flooding the async queue
    minimum_travel_distance: 0.2  # meters (was 0.3 — 33% tighter, won't overwhelm solver)
    minimum_travel_heading: 0.2   # radians (~11.5 deg, was 0.3)

    # -- Loop closure --
    loop_search_maximum_distance: 4.0   # meters — wider search for recovery
    do_loop_closing: true
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # -- Correlation search (scan matching) --
    correlation_search_space_dimension: 0.5   # Default — larger values crash slam_toolbox (probability grid OOB)
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # -- Loop closure search --
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # -- Scan matcher --
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349   # ~0.2 deg
    coarse_search_angle_offset: 0.349   # ~20 deg
    coarse_angle_resolution: 0.0349     # ~2 deg
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # -- General --
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02    # 50Hz TF publish rate
    map_update_interval: 5.0          # Seconds between map publishes
    enable_interactive_mode: true
    use_lifecycle_manager: false
    use_sim_time: false

    # -- Serialization (save/load maps) --
    map_file_name: ""                 # Empty = don't auto-save
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: true

    # -- Stack size for ceres (needed for large maps) --
    stack_size_to_use: 40000000       # 40MB
