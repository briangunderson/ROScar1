roscar_driver:
  ros__parameters:
    # Serial connection to YB-ERF01-V3.0
    serial_port: "/dev/roscar_board"
    car_type: 1            # 1 = X3 mecanum, 2 = X3_PLUS, 4 = X1
    serial_delay: 0.002

    # TF frame names
    odom_frame: "odom"
    base_frame: "base_footprint"
    imu_frame: "imu_link"
    publish_odom_tf: false   # EKF owns odom->base_footprint TF

    # Velocity limits (m/s and rad/s)
    max_linear_x: 1.0
    max_linear_y: 1.0
    max_angular_z: 5.0

    # Publish rate for sensor data (Hz)
    pub_rate: 20.0
